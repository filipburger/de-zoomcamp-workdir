version: 2

models:
  - name: dim_zones
    description: >
      Dimension table containing NYC TLC taxi zone reference data. Maps each
      location ID to its borough, zone name, and service zone classification.
      Sourced from the taxi_zone_lookup seed file.
    columns:
      - name: locationid
        data_type: int64
        description: Unique identifier for the taxi zone, used as the join key for pickup and dropoff locations in fact_trips.

      - name: borough
        data_type: string
        description: The NYC borough (Manhattan, Brooklyn, Queens, Bronx, Staten Island, or EWR/Unknown) in which the zone is located.

      - name: zone
        data_type: string
        description: The specific named taxi zone within the borough (e.g. "Upper East Side North", "JFK Airport").

      - name: service_zone
        data_type: string
        description: The TLC service zone classification (e.g. "Yellow Zone", "Boro Zone", "Airports").

  - name: fact_trips
    description: >
      Core fact table combining cleaned and unioned Yellow and Green taxi
      trip data, enriched with pickup/dropoff zone information from
      dim_zones. Excludes trips with unknown borough. Each row represents
      one completed taxi trip.
    columns:
      - name: trip_id
        data_type: string
        description: Surrogate key generated from vendor_id and pickup datetime, uniquely identifying each trip record.

      - name: vendor_id
        data_type: int64
        description: Code indicating the technology provider that supplied the trip record (1 = Creative Mobile Technologies, 2 = VeriFone Inc.).

      - name: rate_code_id
        data_type: int64
        description: The final rate code in effect at the end of the trip (1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated fare, 6=Group ride).

      - name: pickup_location_id
        data_type: int64
        description: TLC taxi zone in which the trip began. Foreign key to dim_zones.locationid.

      - name: dropoff_location_id
        data_type: int64
        description: TLC taxi zone in which the trip ended. Foreign key to dim_zones.locationid.

      - name: pickup_datetime
        data_type: timestamp
        description: Date and time when the meter was engaged, marking the start of the trip.

      - name: dropoff_datetime
        data_type: timestamp
        description: Date and time when the meter was disengaged, marking the end of the trip.

      - name: store_and_fwd_flag
        data_type: string
        description: Indicates whether the trip record was held in vehicle memory before being sent to the vendor due to no server connection ("Y" = stored and forwarded, "N" = not).

      - name: passenger_count
        data_type: int64
        description: Number of passengers in the vehicle, as entered by the driver.

      - name: trip_distance
        data_type: numeric
        description: Elapsed trip distance in miles, as reported by the taximeter.

      - name: fare_amount
        data_type: numeric
        description: Time-and-distance fare calculated by the meter, excluding extras, tolls, and surcharges.

      - name: extra
        data_type: numeric
        description: Miscellaneous extras and surcharges, primarily the $0.50/$1 rush hour and overnight charges.

      - name: mta_tax
        data_type: numeric
        description: $0.50 MTA tax automatically triggered based on the metered rate in use.

      - name: tip_amount
        data_type: numeric
        description: Tip amount. Automatically populated for credit card payments; cash tips are not captured in this field.

      - name: tolls_amount
        data_type: numeric
        description: Total amount of all tolls paid during the trip.

      - name: ehail_fee
        data_type: numeric
        description: E-hail fee applied to trips booked via app dispatch. Only populated for Green taxi trips; null for Yellow.

      - name: improvement_surcharge
        data_type: numeric
        description: $0.30 improvement surcharge assessed on hailed trips at the flag drop, in effect since 2015.

      - name: total_amount
        data_type: numeric
        description: Total amount charged to the passenger, including fare, extras, taxes, tolls, and surcharges. Does not include cash tips.

      - name: payment_type
        data_type: int64
        description: Numeric code indicating how the passenger paid for the trip (1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided trip).

      - name: payment_type_description
        data_type: string
        description: Human-readable label derived from payment_type via the get_payment_type_description macro.

      - name: pickup_borough
        data_type: string
        description: Borough in which the trip's pickup zone is located, joined from dim_zones.

      - name: pickup_zone
        data_type: string
        description: Named taxi zone where the trip began, joined from dim_zones.

      - name: dropoff_borough
        data_type: string
        description: Borough in which the trip's dropoff zone is located, joined from dim_zones.

      - name: dropoff_zone
        data_type: string
        description: Named taxi zone where the trip ended, joined from dim_zones.